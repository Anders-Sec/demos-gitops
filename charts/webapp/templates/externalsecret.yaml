{{- if .Values.externalSecrets.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "webapp.fullname" . }}-secrets
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
  annotations:
    # Create/sync secrets before the workloads so the backend can start.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ include "webapp.secretName" . }}
    creationPolicy: Owner
    {{- with .Values.externalSecrets.template }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
