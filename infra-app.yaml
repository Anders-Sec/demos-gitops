# Deploys the shared infra: demos namespace, shared Postgres, wildcard cert.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demos-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Anders-Sec/demos-gitops.git
    targetRevision: main
    path: infra
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: demos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
